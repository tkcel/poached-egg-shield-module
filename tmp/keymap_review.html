  .legend-color { width: 16px; height: 16px; border-radius: 4px; border: 1px solid #444; }
  .layer { margin-bottom: 56px; }
  .layer-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; color: #7ec8e3; }
  .layer-title span { font-size: 0.8rem; font-weight: 400; color: #888; margin-left: 8px; }
  .keyboard {
    position: relative;
    width: 960px;
    height: 240px;
    margin: 0 auto;
  }
  .key {
    position: absolute;
    background: #2a2a4a;
    border: 1px solid #444;
    border-radius: 5px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 500;
    text-align: center;
    line-height: 1.2;
    transition: transform 0.1s;
  }
  .key:hover { transform: translateY(-2px); background: #3a3a5a; z-index: 10; }
  .key .main { font-size: 0.75rem; font-weight: 600; }
  .key .sub { font-size: 0.55rem; color: #999; margin-top: 1px; }
  .key.mod { background: #3a2a4a; border-color: #7a5a8a; }
  .key.layer-key { background: #2a4a3a; border-color: #5a8a6a; }
  .key.nav { background: #4a3a2a; border-color: #8a7a5a; }
  .key.none-key { background: #222; border-color: #333; color: #555; }
  .key.trans-key { background: #252535; border-color: #383848; color: #666; }
  .key.bt-key { background: #2a3a4a; border-color: #5a8aaa; }
  .key.special { background: #4a2a2a; border-color: #8a5a5a; }
  .key.thumb { background: #2a3a5a; border-color: #5a7aaa; }
  .key.mouse-move { background: #2a4a4a; border-color: #5aaa9a; }
  .key.mouse-click { background: #4a2a3a; border-color: #aa5a7a; }
  .key.mouse-scroll { background: #3a3a2a; border-color: #8a8a5a; }
  .key.mission { background: #3a2a5a; border-color: #7a5aaa; }

function renderLayer(layer) {
  const section = document.createElement("div");
  section.className = "layer";

  const title = document.createElement("div");
  title.className = "layer-title";
  title.innerHTML = `${layer.name} <span>${layer.desc}</span>`;
  section.appendChild(title);

  const kb = document.createElement("div");
  kb.className = "keyboard";

  layer.keys.forEach((keyDef, i) => {
    const pk = physicalKeys[i];
    const el = document.createElement("div");
    el.className = "key" + (keyDef[2] ? " " + keyDef[2] : "");
    el.style.left   = (pk.x * S + PAD) + "px";
    el.style.top    = (pk.y * S + PAD) + "px";
    el.style.width  = (pk.w * S - PAD * 2) + "px";
    el.style.height = (pk.h * S - PAD * 2) + "px";

    let inner = `<div class="main">${keyDef[0]}</div>`;
    if (keyDef[1]) inner += `<div class="sub">${keyDef[1]}</div>`;
    el.innerHTML = inner;
    kb.appendChild(el);
  });

  section.appendChild(kb);
  return section;
}
